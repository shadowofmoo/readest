services:
  android-builder:
    build:
      context: .
      dockerfile: Dockerfile.android
    volumes:
      - ./apps/readest-app/src-tauri/gen/android/app/build/outputs:/app/apps/readest-app/src-tauri/gen/android/app/build/outputs
      - ./apps/readest-app/src-tauri/readest.keystore:/app/apps/readest-app/src-tauri/readest.keystore
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target-startup:/app/apps/readest-app/src-tauri/target
      - gradle-cache:/root/.gradle
    environment:
      - NDK_HOME=/opt/android-sdk/ndk/28.2.13676358

volumes:
  cargo-registry:
  cargo-git:
  cargo-target-startup:
  gradle-cache:

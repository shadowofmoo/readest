name: Build

on:
  push:
    branches: [local]
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            rust_target: x86_64-pc-windows-msvc
            args: '--bundles nsis'

          - os: ubuntu-latest
            name: Android
            rust_target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java (Android only)
        if: matrix.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK (Android only)
        if: matrix.name == 'Android'
        uses: android-actions/setup-android@v4

      - name: Cache NDK (Android only)
        if: matrix.name == 'Android'
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/28.2.13676358
          key: ndk-28.2.13676358

      - name: Install NDK (Android only)
        if: matrix.name == 'Android'
        run: sdkmanager "ndk;28.2.13676358"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup vendors
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.name }}
          cache-on-failure: true

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/readest-app/.next/cache
          key: nextjs-${{ matrix.name }}-${{ hashFiles('apps/readest-app/pnpm-lock.yaml') }}
          restore-keys: |
            nextjs-${{ matrix.name }}-

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_APP_PLATFORM=tauri" >> .env.local
          cp .env.local apps/readest-app/.env.local

      - name: Build Android APK
        if: matrix.name == 'Android'
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: |
          cd apps/readest-app/
          pnpm tauri android init
          pnpm tauri icon ../../data/icons/readest-book.png
          git checkout .

          pnpm tauri android build -t aarch64

      - name: Build Desktop (tauri-action)
        if: matrix.name != 'Android'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        with:
          projectPath: apps/readest-app
          args: ${{ matrix.args || '' }}

      - name: Upload artifacts (Android)
        if: matrix.name == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/readest-app/src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

      - name: Upload artifacts (Desktop)
        if: matrix.name != 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: apps/readest-app/src-tauri/target/**/release/bundle/**/*.exe

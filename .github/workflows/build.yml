name: Build

on:
  push:
    branches: [local]
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            rust_target: x86_64-pc-windows-msvc
            args: '--bundles nsis'

          - os: macos-latest
            name: macOS Universal
            rust_target: x86_64-apple-darwin,aarch64-apple-darwin
            args: '--target universal-apple-darwin --bundles dmg'

          - os: ubuntu-22.04
            name: Linux x64
            rust_target: x86_64-unknown-linux-gnu

          - os: ubuntu-latest
            name: Android
            rust_target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java (Android only)
        if: matrix.name == 'Android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Android only)
        if: matrix.name == 'Android'
        uses: android-actions/setup-android@v4

      - name: Install NDK (Android only)
        if: matrix.name == 'Android'
        run: sdkmanager "ndk;28.2.13676358"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup vendors
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.name }}

      - name: Install Linux dependencies
        if: matrix.name == 'Linux x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig-dev libgtk-3-dev \
            libwebkit2gtk-4.1 libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev gir1.2-javascriptcoregtk-4.1 \
            gir1.2-webkit2-4.1 libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_APP_PLATFORM=tauri" >> .env.local
          cp .env.local apps/readest-app/.env.local

      - name: Build Android APK
        if: matrix.name == 'Android'
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: |
          cd apps/readest-app/
          pnpm tauri android init
          pnpm tauri icon ../../data/icons/readest-book.png
          git checkout .

          # Debug signing (no keystore secret needed)
          pnpm tauri android build -t aarch64

      - name: Build Desktop (tauri-action)
        if: matrix.name != 'Android'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=8192'
        with:
          projectPath: apps/readest-app
          args: ${{ matrix.args || '' }}

      - name: Upload artifacts (Android)
        if: matrix.name == 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/readest-app/src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

      - name: Upload artifacts (Desktop)
        if: matrix.name != 'Android'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            apps/readest-app/src-tauri/target/**/release/bundle/**/*.exe
            apps/readest-app/src-tauri/target/**/release/bundle/**/*.dmg
            apps/readest-app/src-tauri/target/**/release/bundle/**/*.AppImage
